services:
  frontend:
    build:
      context: ../../../frontend
      dockerfile: Dockerfile
    container_name: ai-test-frontend
    ports:
      - "3008:3008"
    networks:
      - app-network
    depends_on:
      - backend

  backend:
    build:
      context: ../../../backend
      dockerfile: Dockerfile
    container_name: ai-test-backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - ../../../backend/data:/app/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
