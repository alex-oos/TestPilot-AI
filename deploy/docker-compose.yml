services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ai-test-platform
    ports:
      - "8001:8001"
      - "3008:3008"
    environment:
      - BACKEND_PORT=8001
      - FRONTEND_PORT=3008
      - DATABASE_URL=sqlite:///./data/app.db
    volumes:
      - ../data:/app/data
      - ../backend:/app/backend
      - ../frontend:/app/frontend
    restart: unless-stopped
